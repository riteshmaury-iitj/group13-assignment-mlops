name: Manual Inference Test

on:
  workflow_dispatch:
    inputs:
      text:
        description: 'Text to classify'
        required: true
        default: 'Stock market rallied today on strong earnings reports'
      model:
        description: 'HuggingFace model name'
        required: true
        default: 'YuvarajK-g25ait2054/ag-news-distilbert'
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  inference:
    runs-on: ubuntu-latest
    env:
      HF_HUB_TIMEOUT: "120"
      TRANSFORMERS_TIMEOUT: "120"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install transformers torch scikit-learn pandas numpy
    
    - name: Run inference with default values (with retry)
      run: |
        echo "Running inference with default model and text..."
        for attempt in 1 2 3; do
          python inference.py \
            --text "${{ github.event.inputs.text || 'Stock market rallied today on strong earnings reports' }}" \
            --model "${{ github.event.inputs.model || 'YuvarajK-g25ait2054/ag-news-distilbert' }}" \
          && break
          echo "Attempt $attempt failed, retrying in 20s..."
          sleep 20
        done
    
    - name: Show result
      run: |
        echo "Classification completed!"
        cat inference_result.json || echo "No result file generated"
