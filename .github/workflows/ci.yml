name: CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies (no heavy torch/transformers needed for CI checks)
      run: |
        pip install pandas numpy requests

    - name: Check required files exist
      run: |
        ls -la
        test -f src/inference.py
        test -f src/utils.py
        test -f data/id2label.json
        test -f Dockerfile
        test -f requirements.txt
        echo "All required files present"

    - name: Validate id2label.json
      run: |
        python -c "import json; data = json.load(open('data/id2label.json')); assert len(data)==4; print('Labels OK:', data)"

    - name: Validate sample_data.json
      run: |
        python -c "import json; data = json.load(open('data/sample_data.json')); print('sample_data.json OK')"

    - name: Check Python syntax
      run: |
        python -m py_compile src/inference.py
        python -m py_compile src/utils.py
        echo "Syntax check passed"
