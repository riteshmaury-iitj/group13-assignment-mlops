name: CI Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install transformers==4.46.0 torch scikit-learn pandas numpy requests
    
    - name: Check files exist
      run: |
        ls -la
        test -f inference.py
        test -f utils.py
        test -f id2label.json
    
    - name: Validate id2label.json
      run: |
        python -c "import json; data = json.load(open('id2label.json')); print('Labels:', data)"
    
    - name: Test inference script syntax
      run: |
        python -m py_compile inference.py
        python -m py_compile utils.py
    
    - name: Run quick inference test
      run: |
        python inference.py --text "test article" --model "distilbert-base-uncased" || echo "Inference test skipped (model required)"
